services:
  postgres:
    image: postgres:latest
    ports:
      - "5433:5432"
    environment:
      TZ: America/Campo_Grande
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql

  springboot:
    build: ./Backend
    ports:
      - "8080:8080"
    environment:
      TZ: America/Campo_Grande
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      REFRESH_EXPIRATION: ${REFRESH_EXPIRATION}
      PEPPER: ${PEPPER}
      WPP_URL: ${WPP_URL}
      WPP_SESSION: ${WPP_SESSION}
      WPP_TOKEN: ${WPP_TOKEN}
      SCRAPER_URL: ${SCRAPER_URL}
    depends_on:
      - postgres
      - scraper
      - wppconnect

  scraper:
    build: ./worker
    ports:
      - "8000:8000"

  wppconnect:
    build:
      context: ./wppconnect-server
    volumes:
      - ./wppconnect-server/config.ts:/usr/src/wpp-server/config.ts
      - ./wppconnect-server/tokens:/usr/src/wpp-server/tokens
      - ./wppconnect-server/userDataDir:/usr/src/wpp-server/userDataDir
    ports:
      - "21465:21465"

volumes:
  postgres_data:
  wpp_tokens: